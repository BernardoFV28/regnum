<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <title>Feudo Brutal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { background: #050505; color: #d4d4d8; font-family: 'Courier New', Courier, monospace; overflow: hidden; margin: 0; }
        #game-container { position: absolute; inset: 0; }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .hud-panel { pointer-events: auto; background: rgba(0,0,0,0.8); border: 1px solid #33261a; padding: 15px; }
        .build-btn { cursor: pointer; transition: 0.3s; border: 1px solid #4a3626; padding: 10px; text-align: center; background: #1a1a1a; }
        .build-btn:hover { background: #33261a; box-shadow: 0 0 10px #b87333; }
    </style>
</head>
<body>

<div id="game-container"></div>

<div id="ui-layer">
    <div class="hud-panel w-full flex justify-between items-center">
        <div class="flex gap-6 text-sm">
            <div>BIOMASSA: <span id="res-bio" class="text-emerald-500">300</span></div>
            <div>COBRE: <span id="res-cop" class="text-amber-600">150</span></div>
            <div>VAPOR: <span id="res-vap" class="text-blue-400">100%</span></div>
        </div>
        <div class="text-xl tracking-widest uppercase">Império de Ferro</div>
    </div>

    <div class="hud-panel w-64 mt-auto">
        <h2 class="text-xs mb-4 uppercase text-amber-700">Protocolos de Construção</h2>
        <div class="grid grid-cols-2 gap-2">
            <div class="build-btn" onclick="startBuild('house')">CABANA</div>
            <div class="build-btn" onclick="startBuild('farm')">FAZENDA</div>
            <div class="build-btn" onclick="startBuild('wall')">MURALHA</div>
        </div>
    </div>
</div>

<script>
    // --- LÓGICA DO MOTOR ---
    const config = {
        type: Phaser.WEBGL,
        parent: 'game-container',
        width: window.innerWidth,
        height: window.innerHeight,
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let buildMode = null;

    function preload() {
        this.load.image('house', 'house.png');
        this.load.image('farm', 'farm.png');
        this.load.image('wall', 'wall.png');
    }

    function create() {
        this.cameras.main.setBackgroundColor('#09090b');
        this.buildings = this.physics.add.staticGroup();
        
        // Input para construção
        this.input.on('pointerdown', (p) => {
            if (buildMode) {
                const b = this.buildings.create(p.x, p.y, buildMode);
                b.setDisplaySize(64, 64);
                buildMode = null;
            }
        });
    }

    function update() {
        // Lógica de câmera e simulação contínua aqui
    }

    function startBuild(type) {
        buildMode = type;
        console.log("Modo Construção:", type);
    }
</script>
</body>
</html>
