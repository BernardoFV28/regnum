<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feudo Brutal: O Último Núcleo</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>:root {
    /* Paleta Biomecânica */
    --void-black: #020202;
    --surface-dark: #0d0d0d;
    --surface-light: #111111;
    --metal-border: #2a2318;
    --metal-rust: #3d3020;
    
    --text-primary: #c8b89a;
    --text-secondary: #6b5f4e;
    
    --gold-dirty: #8a6c2a;
    --gold-bright: #c49a2e;
    --blood-red: #6b1515;
    --blood-bright: #8b0000;
    --flesh-green: #1a3d1a;
    --amber-steam: #c47000;
    --copper-raw: #8b5a00;

    /* Fontes */
    --font-title: 'Cinzel', serif;
    --font-body: 'Crimson Text', serif;
    --font-mono: 'Share Tech Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background-color: var(--void-black);
    color: var(--text-primary);
    font-family: var(--font-body);
    overflow: hidden;
    user-select: none;
}

/* Efeito Scanlines Global */
body::after {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.1) 3px
    );
    pointer-events: none;
    z-index: 999;
}

/* Estado de Crise Global */
body.crisis {
    animation: crisis-throb 2s infinite;
}
@keyframes crisis-throb {
    0%, 100% { box-shadow: inset 0 0 0px var(--blood-red); }
    50% { box-shadow: inset 0 0 150px var(--blood-bright); }
}

#ash-canvas {
    position: absolute; inset: 0; z-index: 1;
}

#ui-layer {
    position: relative; z-index: 10;
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-columns: 350px 1fr 300px;
    grid-template-rows: 80px 1fr 200px;
    padding: 20px; gap: 20px;
}

/* Painéis Base AAA */
.panel {
    background: radial-gradient(circle at top, var(--surface-light), var(--surface-dark));
    border: 2px solid var(--metal-border);
    box-shadow: inset 0 0 30px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.5);
    border-radius: 2px;
    position: relative;
    overflow: hidden;
}

.panel::before {
    content: ""; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none; mix-blend-mode: overlay;
}

h2 {
    font-family: var(--font-title);
    color: var(--gold-dirty);
    text-align: center;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--metal-rust);
    padding-bottom: 10px; margin-bottom: 15px;
}

/* TOP-BAR */
#top-bar {
    grid-column: 1 / -1; display: flex; gap: 30px; justify-content: center;
}

.resource-capsule {
    background: var(--surface-dark); border: 1px solid var(--metal-border);
    display: flex; align-items: center; padding: 10px 20px; gap: 15px;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.9);
}

.res-icon { width: 32px; height: 32px; }

.res-info { display: flex; flex-direction: column; }
.res-label { font-family: var(--font-title); font-size: 10px; color: var(--text-secondary); }
.res-value { font-family: var(--font-mono); font-size: 24px; color: var(--text-primary); position: relative; }

/* Floating Numbers */
.float-text {
    position: absolute; left: 110%; top: 0;
    font-family: var(--font-mono); font-weight: bold;
    animation: floatUp 2s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
}
@keyframes floatUp {
    0% { transform: translateY(10px); opacity: 1; }
    100% { transform: translateY(-30px); opacity: 0; }
}

/* STEAM BAR (Frostpunk Style) */
.steam-gauge-container {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--surface-dark); border: 1px solid var(--metal-border); padding: 5px 20px;
}
.steam-bar { display: flex; gap: 2px; margin: 5px 0; }
.steam-segment { width: 15px; height: 20px; background: var(--metal-border); transition: background 0.3s; }
.steam-segment.active { background: var(--amber-steam); box-shadow: 0 0 8px var(--amber-steam); }
.steam-segment.critical { animation: flicker-light 0.2s infinite; background: var(--blood-red); }

@keyframes flicker-light { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

/* SIDE-LEFT (Construção) */
#side-left { grid-row: 2 / 4; grid-column: 1; display: flex; flex-direction: column; gap: 15px; }
.header-panel { padding: 15px; }

.grid-2x2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; padding-right: 5px; }

.building-card {
    background: var(--surface-dark); border: 1px solid var(--metal-rust);
    padding: 10px; cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; text-align: center;
}
.building-card:hover { border-color: var(--gold-dirty); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(138, 108, 42, 0.1); }
.building-card:active { transform: translateY(1px); }
.building-card.disabled { filter: grayscale(1) opacity(0.5); pointer-events: none; }
.building-card.active-pulse { animation: pulse-organic 3s infinite; border-color: var(--flesh-green); }

@keyframes pulse-organic { 0%, 100% { box-shadow: inset 0 0 0px var(--flesh-green); } 50% { box-shadow: inset 0 0 20px var(--flesh-green); } }

.bldg-icon { width: 40px; height: 40px; margin-bottom: 8px; }
.bldg-name { font-family: var(--font-title); font-size: 12px; margin-bottom: 5px; }
.bldg-cost { font-family: var(--font-mono); font-size: 10px; color: var(--copper-raw); }

/* SIDE-RIGHT */
#side-right { grid-row: 2 / 3; grid-column: 3; }
.clock-panel { padding: 20px; text-align: center; }
.clock-display { font-family: var(--font-mono); font-size: 36px; color: var(--gold-bright); margin-bottom: 10px; }
.invasion-warning { font-family: var(--font-mono); color: var(--blood-red); font-size: 12px; }
.warning-pulse { animation: flicker-light 1s infinite; }

/* BOTTOM-BAR (Log) */
#bottom-bar { grid-row: 3 / 4; grid-column: 2 / -1; }
.log-panel { height: 100%; padding: 15px; overflow: hidden; display: flex; flex-direction: column-reverse; }

.log-entry {
    font-family: var(--font-mono); font-size: 14px; margin-bottom: 8px;
    padding-left: 10px; border-left: 3px solid var(--metal-rust);
    animation: slideIn 0.3s ease-out forwards; opacity: 0; transform: translateX(-20px);
}
@keyframes slideIn { to { opacity: 1; transform: translateX(0); } }

.log-info { color: var(--text-secondary); }
.log-warn { color: var(--gold-dirty); border-left-color: var(--gold-dirty); }
.log-crit { color: var(--blood-red); border-left-color: var(--blood-red); font-weight: bold; }

/* SCROLLBAR DENTE DE ENGRENAGEM */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--void-black); border-left: 1px solid var(--metal-border); }
::-webkit-scrollbar-thumb { background: var(--metal-rust); background-image: repeating-linear-gradient(0deg, transparent, transparent 4px, var(--surface-dark) 4px, var(--surface-dark) 8px); }

/* OVERLAY DE CRISE */
#crisis-overlay {
    position: absolute; inset: 0; background: rgba(107, 21, 21, 0.85);
    z-index: 1000; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(5px);
}
#crisis-overlay.hidden { display: none; }
.crisis-scanline {
    position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.1) 50%, rgba(255,255,255,0));
    background-size: 100% 8px; animation: scan 2s linear infinite; opacity: 0.3;
}
@keyframes scan { 0% { background-position: 0 -100vh; } 100% { background-position: 0 100vh; } }
.crisis-content { text-align: center; z-index: 2; }
#crisis-title { font-family: var(--font-title); font-size: 48px; color: #fff; letter-spacing: 10px; animation: flicker-light 0.1s infinite; margin-bottom: 20px;}
#crisis-typewriter { font-family: var(--font-mono); font-size: 24px; color: var(--text-primary); margin-bottom: 30px;}
#crisis-timer { font-family: var(--font-mono); font-size: 64px; color: var(--blood-bright); font-weight: bold;}</style>
    <script src="UIManager.js"></script>
<script src="CrisisSystem.js"></script>
<script src="WorldEngine.js"></script> <script src="colonymanager.js"></script>
</head>
<body>

    <canvas id="ash-canvas"></canvas>

    <div id="crisis-overlay" class="hidden">
        <div class="crisis-scanline"></div>
        <div class="crisis-content">
            <h1 id="crisis-title">ALERTA DE SISTEMA</h1>
            <p id="crisis-typewriter"></p>
            <div id="crisis-timer">00:00:00</div>
        </div>
    </div>

    <main id="ui-layer">
        
        <header id="top-bar">
            <div class="resource-capsule">
                <div class="res-icon" id="icon-bio"></div>
                <div class="res-info">
                    <span class="res-label">BIOMASSA</span>
                    <span class="res-value" id="val-bio">300</span>
                </div>
            </div>
            
            <div class="resource-capsule">
                <div class="res-icon" id="icon-cop"></div>
                <div class="res-info">
                    <span class="res-label">COBRE</span>
                    <span class="res-value" id="val-cop">150</span>
                </div>
            </div>

            <div class="steam-gauge-container">
                <span class="res-label">PRESSÃO DO NÚCLEO</span>
                <div class="steam-bar" id="steam-bar">
                    </div>
                <span class="res-value amber-glow" id="val-vap">100%</span>
            </div>
        </header>

        <aside id="side-left">
            <div class="panel header-panel">
                <h2>CÓDICE DE CONSTRUÇÃO</h2>
            </div>
            <div id="building-grid" class="grid-2x2">
                </div>
        </aside>

        <aside id="side-right">
            <div class="panel clock-panel">
                <h2>CICLO ATUAL</h2>
                <div class="clock-display" id="day-counter">DIA 01</div>
                <div class="invasion-warning" id="invasion-warning">
                    PRÓXIMO ATAQUE EM <span id="days-to-invasion">5</span> DIAS
                </div>
            </div>
        </aside>

        <footer id="bottom-bar">
            <div class="panel log-panel">
                <div id="colony-log">
                    </div>
            </div>
        </footer>

    </main>

    <script src="UIManager.js"></script>
    <script src="CrisisSystem.js"></script>
    <script src="colonymanager.js"></script>
</body>
</html>
