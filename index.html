<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEUDO BRUTAL: ORGÂNICO & IMPERIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020202; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        .crt::after {
            content: " "; display: block; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 999;
        }
        .vignette {
            box-shadow: inset 0 0 100px rgba(0,0,0,0.95);
        }
    </style>
</head>
<body class="w-screen h-screen crt relative text-neutral-400 select-none">

    <canvas id="primary-engine-canvas" class="absolute inset-0 w-full h-full z-0 vignette"></canvas>

    <div class="absolute inset-0 z-10 pointer-events-none flex flex-col justify-between p-6">
        
        <div class="w-full bg-black/80 border border-zinc-900 p-4 flex justify-between items-center pointer-events-auto">
            <div class="flex gap-10 text-xs">
                <div><span class="text-zinc-600 block">🥩 BIOMASSA</span><span id="ui-biomass" class="text-emerald-500 font-bold text-lg">0</span></div>
                <div><span class="text-zinc-600 block">⚙️ COBRE ALQUÍMICO</span><span id="ui-copper" class="text-amber-600 font-bold text-lg">0</span></div>
                <div><span class="text-zinc-600 block">💨 VAPOR DE SANGUE</span><span id="ui-steam" class="text-orange-500 font-bold text-lg">0</span></div>
                <div><div><span class="text-zinc-600 block">🧠 MEDO COLETIVO</span><span id="ui-fear" class="text-purple-500 font-bold text-lg">0</span></div></div>
            </div>
            <div class="text-right">
                <div id="ui-weather" class="text-red-500 font-bold text-xs tracking-widest animate-pulse">ESTADO: CALMARIA MORTA</div>
            </div>
        </div>

        <div class="w-full flex justify-between items-end pointer-events-auto">
            <div class="w-96 bg-black/90 border border-zinc-900 p-4 h-48 flex flex-col">
                <div class="text-[10px] text-zinc-500 border-b border-zinc-900 pb-1 mb-2 tracking-widest font-bold">TRANSMISSÃO SINÁPTICA</div>
                <div id="terminal-log" class="text-[10px] flex-grow overflow-y-auto flex flex-col gap-1 text-zinc-400"></div>
            </div>

            <div class="flex gap-3">
                <button onclick="window.buildStructure('incubadora')" class="px-4 py-3 bg-neutral-950 border border-emerald-900/60 text-emerald-500 hover:bg-emerald-950 text-xs font-bold tracking-widest uppercase transition-all">Sintetizar Incubadora</button>
                <button onclick="window.buildStructure('extrator')" class="px-4 py-3 bg-neutral-950 border border-amber-900/60 text-amber-500 hover:bg-amber-950 text-xs font-bold tracking-widest uppercase transition-all">Girar Extrator de Cobre</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { EngineECS, ComponentMask } from './ecs-core.js';
        import { DeterministicGameLoop } from './game-loop.js';
        import { SystemsPipeline } from './systems-pipeline.js';
        import { VisceralRenderPipeline } from './visual-effects.js';
         import { BiopunkAudioEngine } from './audio-engine.js';
                
        import { SocialSimulationSystem } from './social-simulation.js';
        import { BiopunkAIDirector } from './ai-director.js';
        import { FastPathfinder } from './pathfinding-lowlatency.js';
        import { CinematicCrisisDirector } from './crisis-director.js';
        
        
        const socialSys = new SocialSimulationSystem();
        importAI = new BiopunkAIDirector();
        const pathfinder = new FastPathfinder(64, 64);
        const crisisDirector = new CinematicCrisisDirector();
        window.Events.on('CRISIS_TRIGGERED', (data) => {
            crisisDirector.triggerCrisis(data.type, GameState);
        });
        function tickSubsystems(ecs, dt, GameState) {
            pathfinder.processWalkingPool(ecs, dt);
            socialSys.update(ecs, dt, GameState);
            importAI.executeTacticalTick(ecs, GameState, dt);
            crisisDirector.update(GameState, ecs, dt);
        }
        class InternalBus {
            constructor() { this.m = new Map(); }
            on(e, c) { if(!this.m.has(e)) this.m.set(e,[]); this.m.get(e).push(c); }
            emit(e, d) { if(this.m.has(e)) this.m.get(e).forEach(c => c(d)); }
        }
        window.Events = new InternalBus();

        // Estado Estruturado Base da Engine
        const GameState = {
            weather: 'CALMARIA_MORTA',
            weatherTimer: 0,
            siegeTimer: 0,
            steamPressure: 100,
            collectiveFear: 0,
            fanaticism: 0,
            audioSynth: null,
            resources: { biomass: 250, copper: 100, population: 40 }
        };

        const canvas = document.getElementById('primary-engine-canvas');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const audio = new BiopunkAudioEngine();
        const ecs = new EngineECS();
        const loop = new DeterministicGameLoop(30);
        const pipeline = new SystemsPipeline(audio.ctx);
        const FX = new VisceralRenderPipeline(canvas);

        // Conexão do Barramento para Feedback Cinemático
        window.Events.on('HUD_FLASH', (data) => {
            FX.triggerShake(15);
            const entry = document.createElement('div');
            entry.className = "text-red-500 font-bold";
            entry.innerText = `> ${data.text}`;
            document.getElementById('terminal-log').prepend(entry);
        });

        window.Events.on('COMBAT_LOG', (data) => {
            const entry = document.createElement('div');
            entry.className = "text-purple-400";
            entry.innerText = `> ${data.text}`;
            document.getElementById('terminal-log').prepend(entry);
        });

        // Eventos Globais de Construção Injetados no ECS
        window.buildStructure = (type) => {
            audio.playVisceralClick();
            if (type === 'incubadora') {
                ecs.createEntity(ComponentMask.Transform | ComponentMask.Renderable | ComponentMask.Infrastructure | ComponentMask.InfectionVector, {
                    Transform: { x: Math.random() * 10, y: Math.random() * 8, targetX: 0, targetY: 0 },
                    Renderable: { spriteId: 1, frame: 0, pulseOffset: Math.random(), opacity: 1.0 },
                    Infrastructure: { tier: 1, temperature: 30, integrity: 100, heatDemand: 5 },
                    InfectionVector: { rotLevel: 0, sporeEmission: 2, necrosis: 0 }
                });
            } else if (type === 'extrator') {
                ecs.createEntity(ComponentMask.Transform | ComponentMask.Renderable | ComponentMask.Infrastructure | ComponentMask.EconomicNode, {
                    Transform: { x: Math.random() * 10, y: Math.random() * 8, targetX: 0, targetY: 0 },
                    Renderable: { spriteId: 2, frame: 0, pulseOffset: Math.random(), opacity: 1.0 },
                    Infrastructure: { tier: 1, temperature: 20, integrity: 100, heatDemand: 12 },
                    EconomicNode: { prodRate: 4.5, efficiency: 1.0, corruption: 0 }
                });
            }
        };

        // Ativação do Motor sob Demanda do Usuário (Políticas de Áudio do Navegador)
        window.addEventListener('click', () => {
            if (!audio.ctx) {
                audio.init();
                // Vincula o oscilador de feedback ao estado mental da simulação
                GameState.audioSynth = audio.drone;
                loop.start(
                    (dt) => pipeline.update(ecs, dt, GameState),
                    (alpha) => {
                        FX.applyEffects(GameState, () => {
                            pipeline.RenderSystem(ecs, FX.ctx, alpha, GameState);
                        });
                        
                        // Atualização Dinâmica Otimizada da HUD Cinzel
                        document.getElementById('ui-biomass').innerText = Math.floor(GameState.resources.biomass);
                        document.getElementById('ui-copper').innerText = Math.floor(GameState.resources.copper);
                        document.getElementById('ui-steam').innerText = Math.floor(GameState.steamPressure) + "%";
                        document.getElementById('ui-fear').innerText = Math.floor(GameState.collectiveFear) + "%";
                        document.getElementById('ui-weather').innerText = `ATMOSFERA: ${GameState.weather}`;
                    }
                );
            }
        }, { once: true });
    </script>
</body>
</html>
